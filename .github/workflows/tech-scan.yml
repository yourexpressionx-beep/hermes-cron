name: Daily Tech Scan
on:
  schedule:
    - cron: '30 1 * * *'
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Send tech scan
        env:
          BOT: ${{secrets.TELEGRAM_BOT_TOKEN}}
          CHAT: ${{secrets.TELEGRAM_CHAT_ID}}
        run: |
          REPORT="Tech Scan - $(date +%Y-%m-%d)"

          curl -s "https://api.duckduckgo.com/?q=AI+video+generation+latest+news+2026&format=json&no_html=1" | python3 -c "
import json,sys
d=json.load(sys.stdin)
print(d.get('AbstractText','')[:200])
" 2>/dev/null

          curl -s -X POST "https://api.telegram.org/bot${BOT}/sendMessage" -d "chat_id=${CHAT}" -d "text=${REPORT}

          AI Video Gen: checking...

          7 AM IST"
