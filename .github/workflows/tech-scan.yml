name: Daily Tech Scan
on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Send tech scan
        env:
          BOT: ${{secrets.TELEGRAM_BOT_TOKEN}}
          CHAT: ${{secrets.TELEGRAM_CHAT_ID}}
        run: |
          TODAY=$(date +%Y-%m-%d)
          R1=$(curl -s "https://api.duckduckgo.com/?q=AI+video+generation+latest+news+2026&format=json&no_html=1" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('AbstractText','')[:200])" 2>/dev/null || echo "N/A")
          R2=$(curl -s "https://api.duckduckgo.com/?q=AI+image+generation+model+updates+2026&format=json&no_html=1" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('AbstractText','')[:200])" 2>/dev/null || echo "N/A")
          R3=$(curl -s "https://api.duckduckgo.com/?q=Claude+Code+Codex+AI+coding+agent+updates+2026&format=json&no_html=1" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('AbstractText','')[:200])" 2>/dev/null || echo "N/A")
          REPORT="Tech Scan - ${TODAY}%0A%0AAI Video Gen:%0A${R1}%0A%0AAI Image Gen:%0A${R2}%0A%0AAI Coding Agents:%0A${R3}%0A%0A7 AM IST"
          curl -s -X POST "https://api.telegram.org/bot${BOT}/sendMessage" -d "chat_id=${CHAT}" -d "text=${REPORT}"
