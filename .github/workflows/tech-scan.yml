name: Daily Tech Scan
on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Run tech scan
        env:
          BOT: ${{secrets.TELEGRAM_BOT_TOKEN}}
          CHAT: ${{secrets.TELEGRAM_CHAT_ID}}
        run: |
          TODAY=$(date +%Y-%m-%d)

          get_ddg() {
            curl -s "https://api.duckduckgo.com/?q=${1}&format=json&no_html=1" 2>/dev/null \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('AbstractText','No results')[:200])" 2>/dev/null \
              || echo "No results"
          }

          R1=$(get_ddg "AI+video+generation+latest+2026")
          R2=$(get_ddg "AI+image+generation+model+updates+2026")
          R3=$(get_ddg "Claude+Code+Codex+AI+coding+updates+2026")
          R4=$(get_ddg "OpenRouter+new+models+2026")

          MSG="Tech Scan - ${TODAY}%0A%0AAI Video Gen:%0A${R1}%0A%0AAI Image Gen:%0A${R2}%0A%0AAI Coding Agents:%0A${R3}%0A%0AOpenRouter:%0A${R4}%0A%0A7 AM IST"

          curl -s -X POST "https://api.telegram.org/bot${BOT}/sendMessage" \
            -d "chat_id=${CHAT}" -d "text=${MSG}"
