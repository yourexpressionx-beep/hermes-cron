name: Daily Probing
on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Send probing question
        env:
          BOT: ${{secrets.TELEGRAM_BOT_TOKEN}}
          CHAT: ${{secrets.TELEGRAM_CHAT_ID}}
        run: |
          Q="What is the one thing in your dev workflow that frustrates you most?"
          curl -s -X POST "https://api.telegram.org/bot${BOT}/sendMessage" -d "chat_id=${CHAT}" -d "parse_mode=Markdown" -d "text=Good morning Puneet!%0A%0ADaily Check-in%0A%0A${Q}%0A%0AJust reply here."
