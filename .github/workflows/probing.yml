name: Daily Probing
on:
  schedule:
    - cron: '30 5 * * *'
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Send probing question
        env:
          BOT: ${{secrets.TELEGRAM_BOT_TOKEN}}
          CHAT: ${{secrets.TELEGRAM_CHAT_ID}}
        run: |
          Q="What is the one thing in your dev workflow that frustrates you most?"
          MSG="Good morning Puneet!

          Daily Check-in

          $Q

          Just reply here."
          curl -s -X POST "https://api.telegram.org/bot${BOT}/sendMessage" -d "chat_id=${CHAT}" -d "text=${MSG}"
